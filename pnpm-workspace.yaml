packages:
  - "apps/*"

minimumReleaseAgeExclude:
  - "@ai-sdk/*"
  - "@chat-adapter/*"
  - "@rolldown/*"
  - "@turbo/*"
  - "@vercel/*"
  - "@workflow/*"
  - ai
  - chat
  - experimental-ai-sdk-code-mode
  - eve
  - next
  - nitro
  - react
  - react-dom
  - rolldown
  - turbo
  - tsx
  - workflow
allowBuilds:
  esbuild: false
  sharp: false
# Keep Eve and the app on the same locally verified Microsandbox build.
overrides:
  microsandbox: 0.5.7
