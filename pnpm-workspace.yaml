packages:
  - "apps/*"
  - "packages/*"

minimumReleaseAgeExclude:
  - "@ai-sdk/*"
  - "@chat-adapter/*"
  - "@rolldown/*"
  - "@turbo/*"
  - "@vercel/*"
  - "@workflow/*"
  - ai
  - chat
  - experimental-ai-sdk-code-mode
  - eve
  - next
  - nitro
  - react
  - react-dom
  - rolldown
  - turbo
  - workflow
allowBuilds:
  esbuild: false
  sharp: false
# Compatibility for eve releases with an incomplete runtime manifest.
packageExtensions:
  "eve@>=0.6.0-beta.13 <=0.7.0":
    dependencies:
      oxc-parser: 0.134.0
